name: Build engsel + luci-app-engsel untuk OpenWrt 24.10 (ipk) + 25.12 (apk)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipk-24:
    name: IPK ${{ matrix.target.arch }} (OpenWrt 24.10)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: aarch64_generic,         folder: aarch64_generic,         artifact: engsel-aarch64_generic-openwrt24 }
          - { arch: arm_cortex-a7_neon-vfpv4, folder: arm_cortex-a7_neon-vfpv4, artifact: engsel-arm_cortex-a7_neon-vfpv4-openwrt24 }

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK (24.10.0)
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: ${{ matrix.target.arch }}-24.10.0
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel luci-app-engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      - name: Tampilkan hasil build
        run: |
          echo "=== Isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"

      - name: Upload IPK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: |
            bin/packages/${{ matrix.target.folder }}/*/engsel_*.ipk
            bin/packages/${{ matrix.target.folder }}/*/luci-app-engsel_*.ipk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release (jika tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/packages/${{ matrix.target.folder }}/*/engsel_*.ipk
            bin/packages/${{ matrix.target.folder }}/*/luci-app-engsel_*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-24-${{ matrix.target.folder }}
          path: logs/
          retention-days: 7

  build-apk-25:
    name: APK ${{ matrix.target.arch }} (OpenWrt 25.12)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - { arch: aarch64_generic,         folder: aarch64_generic,         artifact: engsel-aarch64_generic-openwrt25 }
          - { arch: arm_cortex-a7_neon-vfpv4, folder: arm_cortex-a7_neon-vfpv4, artifact: engsel-arm_cortex-a7_neon-vfpv4-openwrt25 }

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK (25.12.0 / APK)
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: ${{ matrix.target.arch }}-25.12.0
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel luci-app-engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      - name: Tampilkan hasil build
        run: |
          echo "=== Isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: |
            bin/packages/${{ matrix.target.folder }}/*/engsel-*.apk
            bin/packages/${{ matrix.target.folder }}/*/engsel_*.apk
            bin/packages/${{ matrix.target.folder }}/*/luci-app-engsel-*.apk
            bin/packages/${{ matrix.target.folder }}/*/luci-app-engsel_*.apk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release (jika tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/packages/${{ matrix.target.folder }}/*/engsel-*.apk
            bin/packages/${{ matrix.target.folder }}/*/engsel_*.apk
            bin/packages/${{ matrix.target.folder }}/*/luci-app-engsel-*.apk
            bin/packages/${{ matrix.target.folder }}/*/luci-app-engsel_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-25-${{ matrix.target.folder }}
          path: logs/
          retention-days: 7
